# docker-compose.yml для ООО «Олимп» ERP
# Selectel VPS: 4 vCPU / 16 GB RAM / 100 GB NVMe / Ubuntu 24.04 LTS
# Развёртывание: ~30-45 минут с нуля
#
# Стек: ERPNext 15 + n8n + MinIO + Gotenberg + MariaDB + Redis + Nginx
#
# Порты, открытые наружу: 80, 443 (через Nginx)
# Все остальные сервисы — внутри docker network

# version: "3.9"  # устарело, убрано

# ────────────────────────────────────────────────────────────────────────────
# СЕТЬ
# ────────────────────────────────────────────────────────────────────────────
networks:
  olimp_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ────────────────────────────────────────────────────────────────────────────
# ВОЛЮМЫ (хранилище)
# ────────────────────────────────────────────────────────────────────────────
volumes:
  mariadb_data:
  redis_cache:
  redis_queue:
  erpnext_sites:
  erpnext_assets:
  erpnext_logs:
  minio_data:
  n8n_data:

# ────────────────────────────────────────────────────────────────────────────
# СЕРВИСЫ
# ────────────────────────────────────────────────────────────────────────────
services:

  # ════════════════════════════════════════════════════════════════════════
  # 1. БАЗА ДАННЫХ
  # ════════════════════════════════════════════════════════════════════════
  mariadb:
    image: mariadb:10.6
    container_name: olimp_mariadb
    restart: unless-stopped
    networks: [olimp_net]
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
      - --max-allowed-packet=256M
      - --innodb-buffer-pool-size=4G       # 1/4 от RAM
      - --innodb-log-file-size=512M
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${ERPNEXT_DB_NAME}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./backups/mariadb:/backups
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MARIADB_ROOT_PASSWORD}"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ════════════════════════════════════════════════════════════════════════
  # 2. REDIS (cache + queue)
  # ════════════════════════════════════════════════════════════════════════
  redis-cache:
    image: redis:7-alpine
    container_name: olimp_redis_cache
    restart: unless-stopped
    networks: [olimp_net]
    volumes:
      - redis_cache:/data
    command: redis-server --maxmemory 1gb --maxmemory-policy allkeys-lru

  redis-queue:
    image: redis:7-alpine
    container_name: olimp_redis_queue
    restart: unless-stopped
    networks: [olimp_net]
    volumes:
      - redis_queue:/data

  # ════════════════════════════════════════════════════════════════════════
  # 3. ERPNEXT (бэкенд)
  # ════════════════════════════════════════════════════════════════════════
  backend:
    image: frappe/erpnext:v15
    container_name: olimp_backend
    restart: unless-stopped
    networks: [olimp_net]
    ports:
      - "8000:8000"
    entrypoint: ["/scripts/docker-entrypoint-backend.sh"]
    command:
      - "/home/frappe/frappe-bench/env/bin/gunicorn"
      - "--chdir=/home/frappe/frappe-bench/sites"
      - "--bind=0.0.0.0:8000"
      - "--threads=4"
      - "--workers=2"
      - "--worker-class=gthread"
      - "--worker-tmp-dir=/dev/shm"
      - "--timeout=120"
      - "--preload"
      - "frappe.app:application"
    depends_on:
      mariadb:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      REDIS_CACHE: redis://redis-cache:6379
      REDIS_QUEUE: redis://redis-queue:6379
      SOCKETIO_PORT: 9000
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_DIRECTOR_CHAT_ID: ${TELEGRAM_DIRECTOR_CHAT_ID}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DADATA_API_KEY: ${DADATA_API_KEY}
      QDRANT_URL: http://qdrant:6333
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_assets:/home/frappe/frappe-bench/assets
      - erpnext_logs:/home/frappe/frappe-bench/logs
      - ./backend/olimp_construction:/home/frappe/frappe-bench/apps/olimp_construction
      - ./backend/olimp_construction.pth:/home/frappe/frappe-bench/env/lib/python3.11/site-packages/olimp_construction.pth:ro
      - ./scripts/docker-entrypoint-backend.sh:/scripts/docker-entrypoint-backend.sh:ro
      - ./backend/olimp_construction.pth:/home/frappe/frappe-bench/env/lib/python3.11/site-packages/olimp_construction.pth:ro

  configurator:
    image: frappe/erpnext:v15
    container_name: olimp_configurator
    networks: [olimp_net]
    depends_on:
      mariadb:
        condition: service_healthy
    entrypoint: ["bash", "-c"]
    command:
      - >
        ls -1 apps > sites/apps.txt;
        bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -g redis_cache "redis://redis-cache:6379";
        bench set-config -g redis_queue "redis://redis-queue:6379";
        bench set-config -g redis_socketio "redis://redis-queue:6379";
        bench set-config -gp socketio_port $$SOCKETIO_PORT;
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      SOCKETIO_PORT: 9000
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs

  create-site:
    image: frappe/erpnext:v15
    container_name: olimp_create_site
    networks: [olimp_net]
    depends_on:
      configurator:
        condition: service_completed_successfully
    entrypoint: ["bash", "-c"]
    command:
      - >
        wait-for-it -t 120 mariadb:3306;
        wait-for-it -t 120 redis-cache:6379;
        wait-for-it -t 120 redis-queue:6379;
        bench new-site --mariadb-user-host-login-scope='%' --admin-password=$$ADMIN_PASSWORD --db-root-username=root --db-root-password=$$MARIADB_ROOT_PASSWORD --install-app erpnext --set-default ${SITE_NAME};
    environment:
      ADMIN_PASSWORD: ${ERPNEXT_ADMIN_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs

  # WebSocket для realtime
  websocket:
    image: frappe/erpnext:v15
    container_name: olimp_websocket
    restart: unless-stopped
    networks: [olimp_net]
    depends_on:
      configurator:
        condition: service_completed_successfully
    command: ["node", "/home/frappe/frappe-bench/apps/frappe/socketio.js"]
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs

  # Очереди и cron
  queue-short:
    image: frappe/erpnext:v15
    container_name: olimp_queue_short
    restart: unless-stopped
    networks: [olimp_net]
    depends_on:
      configurator:
        condition: service_completed_successfully
    # Тот же entrypoint, что и у backend: устанавливает зависимости olimp_construction перед exec.
    # Без него воркер падает с exit 127 при первом старте (ImportError на нашем app).
    entrypoint: ["/scripts/docker-entrypoint-backend.sh"]
    command: ["/usr/local/bin/bench", "worker", "--queue", "short,default"]
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
      - ./backend/olimp_construction:/home/frappe/frappe-bench/apps/olimp_construction
      - ./backend/olimp_construction.pth:/home/frappe/frappe-bench/env/lib/python3.11/site-packages/olimp_construction.pth:ro
      - ./scripts/docker-entrypoint-backend.sh:/scripts/docker-entrypoint-backend.sh:ro

  queue-long:
    image: frappe/erpnext:v15
    container_name: olimp_queue_long
    restart: unless-stopped
    networks: [olimp_net]
    depends_on:
      configurator:
        condition: service_completed_successfully
    entrypoint: ["/scripts/docker-entrypoint-backend.sh"]
    command: ["/usr/local/bin/bench", "worker", "--queue", "long,default,short"]
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
      - ./backend/olimp_construction:/home/frappe/frappe-bench/apps/olimp_construction
      - ./backend/olimp_construction.pth:/home/frappe/frappe-bench/env/lib/python3.11/site-packages/olimp_construction.pth:ro
      - ./scripts/docker-entrypoint-backend.sh:/scripts/docker-entrypoint-backend.sh:ro

  scheduler:
    image: frappe/erpnext:v15
    container_name: olimp_scheduler
    restart: unless-stopped
    networks: [olimp_net]
    depends_on:
      configurator:
        condition: service_completed_successfully
    entrypoint: ["/scripts/docker-entrypoint-backend.sh"]
    command: ["/usr/local/bin/bench", "schedule"]
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_DIRECTOR_CHAT_ID: ${TELEGRAM_DIRECTOR_CHAT_ID}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
      - ./backend/olimp_construction:/home/frappe/frappe-bench/apps/olimp_construction
      - ./backend/olimp_construction.pth:/home/frappe/frappe-bench/env/lib/python3.11/site-packages/olimp_construction.pth:ro
      - ./scripts/docker-entrypoint-backend.sh:/scripts/docker-entrypoint-backend.sh:ro

  # ════════════════════════════════════════════════════════════════════════
  # 4. NEXT.JS (кастомный фронт)
  # ════════════════════════════════════════════════════════════════════════
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: olimp/frontend:latest
    container_name: olimp_frontend
    restart: unless-stopped
    networks: [olimp_net]
    environment:
      NEXT_PUBLIC_API_URL: https://${DOMAIN}/api
      NEXT_PUBLIC_SITE_NAME: ${SITE_NAME}
      NODE_ENV: production
    depends_on:
      - backend

  # ════════════════════════════════════════════════════════════════════════
  # 5. NGINX (reverse proxy + SSL)
  # ════════════════════════════════════════════════════════════════════════
  nginx:
    image: nginx:alpine
    container_name: olimp_nginx
    restart: unless-stopped
    networks: [olimp_net]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - erpnext_sites:/home/frappe/frappe-bench/sites:ro
      - erpnext_assets:/home/frappe/frappe-bench/assets:ro
    depends_on:
      - backend
      - frontend
      - websocket

  certbot:
    image: certbot/certbot
    container_name: olimp_certbot
    networks: [olimp_net]
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  # ════════════════════════════════════════════════════════════════════════
  # 6. MINIO (S3-совместимое хранилище)
  # ════════════════════════════════════════════════════════════════════════
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: olimp_minio
    restart: unless-stopped
    networks: [olimp_net]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: https://files.${DOMAIN}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  # ════════════════════════════════════════════════════════════════════════
  # 7. GOTENBERG (PDF из HTML)
  # ════════════════════════════════════════════════════════════════════════
  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: olimp_gotenberg
    restart: unless-stopped
    networks: [olimp_net]
    command:
      - "gotenberg"
      - "--api-timeout=60s"
      - "--chromium-disable-web-security"

  # ════════════════════════════════════════════════════════════════════════
  # 8. N8N (автоматизация)
  # ════════════════════════════════════════════════════════════════════════
  n8n:
    image: n8nio/n8n:latest
    container_name: olimp_n8n
    restart: unless-stopped
    networks: [olimp_net]
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: n8n.${DOMAIN}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://n8n.${DOMAIN}/
      GENERIC_TIMEZONE: Asia/Yekaterinburg
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: n8n_db
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD}
      TENDERGURU_API_KEY: ${TENDERGURU_API_KEY}
      TENDERGURU_REFRESH_KEY: ${TENDERGURU_REFRESH_KEY}
      FRAPPE_API_KEY: ${FRAPPE_API_KEY}
      FRAPPE_API_SECRET: ${FRAPPE_API_SECRET}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - n8n_db

  n8n_db:
    image: postgres:16-alpine
    container_name: olimp_n8n_db
    restart: unless-stopped
    networks: [olimp_net]
    environment:
      POSTGRES_DB: n8n
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: ${N8N_DB_PASSWORD}
    volumes:
      - ./n8n_pgdata:/var/lib/postgresql/data

  # ════════════════════════════════════════════════════════════════════════
  # 9. БЭКАПЫ (cron-контейнер для S3)
  # ════════════════════════════════════════════════════════════════════════
  backup:
    image: alpine:latest
    container_name: olimp_backup
    restart: unless-stopped
    networks: [olimp_net]
    volumes:
      - mariadb_data:/data/mariadb:ro
      - erpnext_sites:/data/sites:ro
      - n8n_data:/data/n8n:ro
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    environment:
      AWS_ACCESS_KEY_ID: ${YANDEX_S3_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${YANDEX_S3_SECRET_KEY}
      AWS_DEFAULT_REGION: ru-central1
      S3_BUCKET: olimp-erp-backups
      S3_ENDPOINT: https://storage.yandexcloud.net
    entrypoint: ["sh", "-c", "apk add --no-cache aws-cli mariadb-client && crond -f -l 8"]

  # ════════════════════════════════════════════════════════════════════════
  # 10. QDRANT (vector DB для AI-ассистента)
  # ════════════════════════════════════════════════════════════════════════
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: olimp_qdrant
    restart: unless-stopped
    networks: [olimp_net]
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant/storage:/qdrant/storage
